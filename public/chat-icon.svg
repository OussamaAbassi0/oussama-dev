<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffc8"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003d2e"/>
      <stop offset="100%" stop-color="#001a20"/>
    </linearGradient>
  </defs>

  <!-- Fond circulaire dégradé cyan -->
  <circle cx="28" cy="28" r="28" fill="url(#bg)"/>

  <!-- Cercle intérieur sombre -->
  <circle cx="28" cy="28" r="20" fill="url(#inner)"/>

  <!-- Circuit board lines - horizontal -->
  <line x1="8" y1="28" x2="15" y2="28" stroke="#00ffc8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="41" y1="28" x2="48" y2="28" stroke="#00ffc8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="28" y1="8" x2="28" y2="15" stroke="#00ffc8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="28" y1="41" x2="28" y2="48" stroke="#00ffc8" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Points de circuit -->
  <circle cx="8" cy="28" r="2" fill="#00ffc8" opacity="0.6"/>
  <circle cx="48" cy="28" r="2" fill="#00ffc8" opacity="0.6"/>
  <circle cx="28" cy="8" r="2" fill="#00ffc8" opacity="0.6"/>
  <circle cx="28" cy="48" r="2" fill="#00ffc8" opacity="0.6"/>

  <!-- Tête du robot - forme hexagonale simplifiée -->
  <rect x="18" y="19" width="20" height="16" rx="4" fill="#00ffc8" opacity="0.15" stroke="#00ffc8" stroke-width="1"/>

  <!-- Yeux LED -->
  <rect x="21" y="24" width="5" height="4" rx="2" fill="#00ffc8"/>
  <rect x="30" y="24" width="5" height="4" rx="2" fill="#00ffc8"/>

  <!-- Reflet sur les yeux -->
  <rect x="22" y="24.5" width="1.5" height="1.5" rx="0.5" fill="white" opacity="0.7"/>
  <rect x="31" y="24.5" width="1.5" height="1.5" rx="0.5" fill="white" opacity="0.7"/>

  <!-- Bouche / ligne de traitement -->
  <rect x="22" y="31" width="12" height="2" rx="1" fill="#00ffc8" opacity="0.6"/>
  <rect x="24" y="31" width="2" height="2" rx="0.5" fill="#00ffc8"/>
  <rect x="27" y="31" width="2" height="2" rx="0.5" fill="#00ffc8"/>
  <rect x="30" y="31" width="2" height="2" rx="0.5" fill="#00ffc8"/>

  <!-- Antenne centrale -->
  <line x1="28" y1="19" x2="28" y2="15" stroke="#00ffc8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="28" cy="14" r="2" fill="#00ffc8"/>
  <circle cx="28" cy="14" r="1" fill="white" opacity="0.8"/>

  <!-- Oreilles / prises -->
  <rect x="14" y="22" width="4" height="8" rx="2" fill="#00ffc8" opacity="0.3" stroke="#00ffc8" stroke-width="0.8"/>
  <rect x="38" y="22" width="4" height="8" rx="2" fill="#00ffc8" opacity="0.3" stroke="#00ffc8" stroke-width="0.8"/>

  <!-- Pulse indicator -->
  <circle cx="28" cy="14" r="4" fill="none" stroke="#00ffc8" stroke-width="0.8" opacity="0.4"/>
</svg>
